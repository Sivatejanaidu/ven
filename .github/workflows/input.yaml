name: Input-demo
on:
  workflow_dispatch:
    inputs:
      Agent_Name:
        description: 'Enter the name of the agent'
        required: true
        default: 'bnext'
      Image_Tag:
        description: 'Enter the image tag'
        required: true
        default: 'v1.0.0'
        type: choice
        options:
          - v1.0.0
          - v1.0.1
          - v1.0.2 
