name: Hello world                                       # Name of the work flow  
on:                                                     # Triggers when this workflow should trigger
 push:
   branches:
     - main
     - develop
 pull_request:
    types:
    - opened
    - synchronize
    - closed 
    branches:
      - main                               # workflow_dispatch trigger used for manual trigger
jobs:
  hello-world:                                          # name of the job
    runs-on: ubuntu-latest 
    steps:
    - name: hello-step
      run: echo " hello shiva"
  build:                                                # name of the job
    runs-on: ubuntu-latest
    needs : hello-world
    steps:
    - name: build-step
      run: echo "build siva"
  test:
    runs-on: ubuntu-latest
    needs : build
    steps:
    - name: test-step
      run : echo "hello venshika naidu akula"
