name: Build-demo
run-name: This was triggered by @${{ github.actor }}
on:
 push:
    branches:
      - main
jobs:
  build-job:
    env:
      APP_NAME: "Demo-app" 
    runs-on: ubuntu-latest 
    steps:
    - name: build stage
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: echo "Build stage completed with ${APP_NAME}"  